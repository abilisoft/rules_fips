name: CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
  schedule:
    - cron: "20 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BUILDBUDDY_ORG_API_KEY: ${{ secrets.BUILDBUDDY_ORG_API_KEY }}
  BAZEL_REMOTE_FALLBACK: ${{ secrets.BUILDBUDDY_ORG_API_KEY == '' && '--config=local' || '' }}

jobs:
  repository:
    name: Repository hygiene and Go tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Check whitespace
        run: git diff-tree --check --root -r HEAD
      - name: Test repository tools
        run: go test ./tools/...
      - name: Vet repository tools
        run: go vet ./tools/...
      - name: Check Bazel and Starlark formatting
        run: >-
          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //tools/buildifier:test
      - name: Analyze the exported AMD64 SDK from an external module
        working-directory: e2e/bcr
        run: >-
          bazel build --nobuild
          ${BAZEL_REMOTE_FALLBACK}
          --platforms=@rules_fips//fips/platforms:linux_amd64
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //:external_sdk
      - name: Analyze the exported Arm64 SDK from an external module
        working-directory: e2e/bcr
        run: >-
          bazel build --nobuild
          ${BAZEL_REMOTE_FALLBACK}
          --platforms=@rules_fips//fips/platforms:linux_arm64
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //:external_sdk

  analysis:
    name: Bazel analysis (${{ matrix.platform }})
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        platform: [linux_amd64, linux_arm64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Analyze SDK
        run: >-
          bazel build --nobuild
          ${BAZEL_REMOTE_FALLBACK}
          --config=${{ matrix.platform }}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //examples:openssl_fips_sdk

  distributions:
    name: SDK (${{ matrix.platform }})
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        platform: [linux_amd64, linux_arm64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Build SDK
        run: >-
          bazel build
          ${BAZEL_REMOTE_FALLBACK}
          --config=${{ matrix.platform }}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //examples:openssl_fips_sdk
