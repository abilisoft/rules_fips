name: CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
  schedule:
    - cron: "20 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BUILDBUDDY_ORG_API_KEY: ${{ secrets.BUILDBUDDY_ORG_API_KEY }}
  BAZEL_REMOTE_FALLBACK: ${{ secrets.BUILDBUDDY_ORG_API_KEY == '' && '--config=local' || '' }}

jobs:
  repository:
    name: Repository hygiene and Go tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Check whitespace
        run: git diff-tree --check --root -r HEAD
      - name: Test repository tools
        run: go test ./tools/...
      - name: Vet repository tools
        run: go vet ./tools/...
      - name: Check Bazel and Starlark formatting
        run: >-
          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //tools/buildifier:test
      - name: Analyze the exported AMD64 SDK from an external module
        working-directory: e2e/bcr
        run: >-
          bazel build --nobuild
          ${BAZEL_REMOTE_FALLBACK}
          --platforms=@rules_fips//fips/platforms:linux_amd64
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //:external_sdk
          //:external_sdk_openssl_test
          //:external_sdk_openssl_tool
          //:external_rust_toolchain_impl
      - name: Build exported SDK execution helpers on GNU Linux
        working-directory: e2e/bcr
        run: >-
          bazel build
          ${BAZEL_REMOTE_FALLBACK}
          --platforms=@rules_fips//fips/platforms:linux_amd64
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //:external_sdk_activation_exec
          //:external_sdk_runtime_launcher_exec
          @rules_fips//fips/toolchains:hermetic_perl_smoke
      - name: Analyze the exported Arm64 SDK from an external module
        working-directory: e2e/bcr
        run: >-
          bazel build --nobuild
          ${BAZEL_REMOTE_FALLBACK}
          --platforms=@rules_fips//fips/platforms:linux_arm64
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //:external_sdk

  analysis:
    name: Bazel analysis (${{ matrix.platform }})
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        platform: [linux_amd64, linux_amd64_glibc, linux_arm64, linux_arm64_glibc]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Analyze SDK
        run: >-
          bazel build --nobuild
          ${BAZEL_REMOTE_FALLBACK}
          --config=${{ matrix.platform }}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //examples:openssl_fips_sdk

  consumers:
    name: Toolchain consumers (${{ matrix.platform }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform: [linux_amd64, linux_amd64_glibc, linux_arm64, linux_arm64_glibc]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Audit target-native build-script inputs
        run: |
          bazel aquery \
            ${BAZEL_REMOTE_FALLBACK} \
            --config=${{ matrix.platform }} \
            --extra_execution_platforms=//fips/platforms:linux_execution_amd64 \
            --output=textproto \
            --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" \
            //test/toolchain:consumer_build_script > "${RUNNER_TEMP}/build-script-actions.textproto"
          if grep -E 'arguments: "/usr/bin/(cc|c\\+\\+|gcc|g\\+\\+|clang|clang\\+\\+)"' "${RUNNER_TEMP}/build-script-actions.textproto"; then
            echo "undeclared host compiler found in Cargo build-script actions" >&2
            exit 1
          fi
          grep -Eq 'fips_llvm_musl_(amd64|arm64)' "${RUNNER_TEMP}/build-script-actions.textproto"
          grep -Eq 'fips_(musl_1_2_5|glibc_2_35)_(amd64|arm64)' "${RUNNER_TEMP}/build-script-actions.textproto"
      - name: Link and execute strict C and Rust consumers
        run: >-
          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          --config=${{ matrix.platform }}
          --extra_execution_platforms=//fips/platforms:linux_execution_amd64
          ${{ contains(matrix.platform, 'arm64') && '--run_under=@fips_qemu_aarch64//:usr/bin/qemu-aarch64' || '' }}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //test/toolchain:cc_binary_test
          //test/toolchain:cc_test
          //test/toolchain:cxx_test
          //test/toolchain:rust_binary_test
      - name: Execute a static musl Rust test through its declared launcher
        if: matrix.platform == 'linux_amd64'
        run: >-
          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          --config=${{ matrix.platform }}
          --extra_execution_platforms=//fips/platforms:linux_execution_amd64
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //test/toolchain:rust_static_runtime_test
      - name: Execute a dynamic glibc Rust test through its declared launcher
        if: matrix.platform == 'linux_amd64_glibc'
        run: >-
          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          --platforms=//test/toolchain:linux_amd64_glibc_dynamic
          --extra_execution_platforms=//fips/platforms:linux_execution_amd64
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //test/toolchain:rust_dynamic_runtime_test
      - name: Build a standard pkg-config Cargo consumer
        if: matrix.platform == 'linux_amd64' || matrix.platform == 'linux_arm64'
        run: >-
          bazel build
          ${BAZEL_REMOTE_FALLBACK}
          --platforms=//test/pkgconfig:${{ matrix.platform }}
          --extra_execution_platforms=//fips/platforms:linux_execution_amd64
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //test/pkgconfig:yeslogic_fontconfig_sys
      - name: Check the pkg-config SDK in the local sandbox
        if: matrix.platform == 'linux_amd64' || matrix.platform == 'linux_arm64'
        run: >-
          bazel build
          ${BAZEL_REMOTE_FALLBACK}
          --platforms=//test/pkgconfig:${{ matrix.platform }}
          --extra_execution_platforms=//fips/platforms:linux_execution_amd64
          --modify_execution_info='^PkgConfigSdkCheck$=+no-cache,^PkgConfigSdkCheck$=+no-remote-exec'
          --strategy=PkgConfigSdkCheck=sandboxed
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //test/pkgconfig:fontconfig_sdk_check

  native-arm64-consumers:
    name: Toolchain consumers (native Arm64, ${{ matrix.platform }})
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        platform: [linux_arm64, linux_arm64_glibc]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Link and execute strict C and Rust consumers natively
        run: >-
          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          --config=${{ matrix.platform }}
          --extra_execution_platforms=//fips/platforms:linux_execution_arm64
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //test/toolchain:cc_binary_test
          //test/toolchain:cc_test
          //test/toolchain:cxx_test
          //test/toolchain:rust_binary_test
      - name: Execute a static musl Rust test through its declared launcher
        if: matrix.platform == 'linux_arm64'
        run: >-
          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          --config=${{ matrix.platform }}
          --extra_execution_platforms=//fips/platforms:linux_execution_arm64
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //test/toolchain:rust_static_runtime_test
      - name: Execute a dynamic glibc Rust test through its declared launcher
        if: matrix.platform == 'linux_arm64_glibc'
        run: >-
          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          --platforms=//test/toolchain:linux_arm64_glibc_dynamic
          --extra_execution_platforms=//fips/platforms:linux_execution_arm64
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //test/toolchain:rust_dynamic_runtime_test

  distributions:
    name: SDK (${{ matrix.platform }})
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        platform: [linux_amd64, linux_amd64_glibc, linux_arm64, linux_arm64_glibc]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Build SDK
        run: >-
          bazel build
          ${BAZEL_REMOTE_FALLBACK}
          --config=${{ matrix.platform }}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //examples:openssl_fips_sdk
          //examples:openssl_fips_sdk_openssl_tool
          //test/pkgconfig:openssl_sdk_check

  sdk-runtime:
    name: Runnable OpenSSL SDK (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux_amd64
            arch: amd64
            runner: ubuntu-24.04
          - platform: linux_amd64_glibc
            arch: amd64
            runner: ubuntu-24.04
          - platform: linux_arm64
            arch: arm64
            runner: ubuntu-24.04-arm
          - platform: linux_arm64_glibc
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Run provider activation under linux-sandbox
        run: >-
          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          --config=${{ matrix.platform }}
          --extra_execution_platforms=//fips/platforms:linux_execution_${{ matrix.arch }}
          --modify_execution_info='^TestRunner$=+no-remote-exec'
          --nocache_test_results
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          --strategy=TestRunner=linux-sandbox
          //examples:openssl_fips_sdk_openssl_test
      - name: Run provider activation under processwrapper-sandbox
        run: >-
          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          --config=${{ matrix.platform }}
          --extra_execution_platforms=//fips/platforms:linux_execution_${{ matrix.arch }}
          --modify_execution_info='^TestRunner$=+no-remote-exec'
          --nocache_test_results
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          --strategy=TestRunner=processwrapper-sandbox
          //examples:openssl_fips_sdk_openssl_test
