name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing signed version tag to release"
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-tag:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      commit_sha: ${{ steps.tag.outputs.commit_sha }}
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - name: Require a signed annotated tag on main
        id: tag
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        with:
          script: |
            const tagName = process.env.TAG_NAME;
            if (!/^v\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(tagName)) {
              core.setFailed(`invalid release tag: ${tagName}`);
              return;
            }
            const ref = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${tagName}`,
            });
            if (ref.data.object.type !== "tag") {
              core.setFailed(`${tagName} is lightweight; releases require a signed annotated tag`);
              return;
            }
            const tag = await github.rest.git.getTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_sha: ref.data.object.sha,
            });
            if (!tag.data.verification?.verified) {
              core.setFailed(`${tagName} is not verified: ${tag.data.verification?.reason || "unknown reason"}`);
              return;
            }
            if (tag.data.object.type !== "commit") {
              core.setFailed(`${tagName} does not point directly to a commit`);
              return;
            }
            const comparison = await github.rest.repos.compareCommitsWithBasehead({
              owner: context.repo.owner,
              repo: context.repo.repo,
              basehead: `${tag.data.object.sha}...main`,
            });
            if (!["ahead", "identical"].includes(comparison.data.status)) {
              core.setFailed(`${tagName} does not identify a commit on main`);
              return;
            }
            core.setOutput("commit_sha", tag.data.object.sha);
            core.setOutput("tag_name", tagName);

  release:
    needs: verify-tag
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ needs.verify-tag.outputs.commit_sha }}
      - name: Require the tag and module versions to match
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TAG_NAME: ${{ needs.verify-tag.outputs.tag_name }}
        with:
          script: |
            const fs = require("fs");
            const moduleFile = fs.readFileSync("MODULE.bazel", "utf8");
            const match = moduleFile.match(/\bversion\s*=\s*"([^"]+)"/);
            const expected = process.env.TAG_NAME.slice(1);
            if (!match || match[1] !== expected) {
              core.setFailed(`MODULE.bazel version ${match?.[1] || "missing"} does not match ${expected}`);
            }
      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          make_latest: true
          tag_name: ${{ needs.verify-tag.outputs.tag_name }}
